apiVersion: apps/v1
kind: Deployment
metadata:
  name: loruceanro-redis
  labels:
    app: loruceanro-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: loruceanro-redis
  template:
    metadata:
      labels:
        app: loruceanro-redis
    spec:
      containers:
        - name: loruceanro-redis
          image: redis:7-alpine
          args: ["--appendonly", "yes"]
          ports:
            - containerPort: 6379
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: loruceanro-redis
spec:
  selector:
    app: loruceanro-redis
  ports:
    - port: 6379
      targetPort: 6379
  type: ClusterIP
