apiVersion: apps/v1
kind: Deployment
metadata:
  name: loruceanro-frontend
  labels:
    app: loruceanro-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: loruceanro-frontend
  template:
    metadata:
      labels:
        app: loruceanro-frontend
    spec:
      containers:
        - name: frontend
          image: beatplugg/frontend
          ports:
            - containerPort: 80
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: loruceanro-frontend
spec:
  selector:
    app: loruceanro-frontend
  ports:
    - port: 80
      targetPort: 80
  type: ClusterIP
