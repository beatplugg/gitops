apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: loruceanro-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - loruceanro.example.com
      secretName: loruceanro-tls
  rules:
    - host: loruceanro.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: loruceanro-frontend
                port:
                  number: 80
          - path: /
            pathType: Prefix
            backend:
              service:
                name: loruceanro-frontend
                port:
                  number: 80
