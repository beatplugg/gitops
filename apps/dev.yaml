apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dev
spec:
  destination:
    namespace: ''
    server: https://kubernetes.default.svc
  source:
    path: overlays/dev
    repoURL: https://github.com/beatplugg/gitops
    targetRevision: HEAD
  sources: []
  project: ''
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      enabled: true
    syncOptions:
      - CreateNamespace=true
